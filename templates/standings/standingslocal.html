{% extends 'layout.html' %}
{% block content %}
    <table class="table">
    <thead>
        <tr>
        <th scope="col">Sæson</th>
        <th scope="col">Navn</th>
        <th scope="col">Liga</th>
        <th scope="col">Division</th>
        <th scope="col">Resulter</th>
        <th scope="col">Sejre</th>
        <th scope="col">Nederlag</th>
        </tr>
    </thead>
    <tbody>
    {% for standing in standings_dto %}
        <tr>
            <td>{{standing.season}}</td>
            <td><a href='teams/{{standing.team_id}}/edit'>{{standing.name}}</a></td>
            <td>{{standing.league}}</td>
            <td>{{standing.division}}</td>
            <td><a href="results/{{standing.team_id}}/edit">Resultater</a></td>
            <td>{{standing.wins}}</td>
            <td>{{standing.losses}}</td>
        </tr>    
    {% endfor %}
    </tbody>
    </table>     
{% endblock %}
