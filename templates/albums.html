{% extends 'layout.html' %}
{% block content %}
    <h2>Alle albums</h2>
    <br>
    <br>
    {% for a in albums %}
        <h3>Id: {{a.id}}</h3>
        <h3>Title: {{a.title}}</h3>
        <h3>Artist: {{a.artist}}</h3>
        <a href="/albums/{{a.id}}">Se mere information</a>
        <p><hr></p>
    {% endfor %}
{% endblock %}
