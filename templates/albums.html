{% extends 'layout.html' %}
{% block content %}
    <h2>Here is a list of all the Albums in our system</h2>
    <br>
    <br>
    {% for a in albums %}
        <h3>Id: {{a.id}}</h3>
        <h3>Title: {{a.title}}</h3>
        <h3>Artist: {{a.artist}}</h3>
        <a href="/albums/{{a.id}}">See my info</a>
        <p>----------------------------------------------------------------------</p>
    {% endfor %}
{% endblock %}
