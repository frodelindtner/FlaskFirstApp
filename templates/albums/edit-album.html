{% extends 'layout.html' %}
{% block content %}
    <div class="col-4">
        <form action="#" method="post">
            <div class="form-group">
                <label for="id">Id:</label>
                <input type="number" name="id" id="id" class="form-control" readonly value="{{album.id}}">
                <label for="title">Title:</label>
                <input type="text" name="title" id="title" class="form-control" value="{{album.title}}">
                <label for="artist">Artist:</label>
                <input type="text" name="artist" id="artist" class="form-control" value="{{album.artist}}">
                <label for="release_year">Release Year:</label>
                <input type="text" name="release_year" id="release_year" class="form-control" value="{{album.release_year}}">
                <label for="title">&nbsp;</label>
                <input type="submit" class="form-control" value="Update">
            </div>            
        </form>
    </div>
{% endblock %}
